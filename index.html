<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPlant - Магазин кімнатних рослин</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <header>
        <div class="logo">EcoPlant</div>
        
        <nav class="nav-menu">
            <ul>
                <li><a href="#">Головна</a></li>
                <li><a href="#">Каталог</a></li>
                <li><a href="#">Про нас</a></li>
                <li><a href="#">Контакти</a></li>
            </ul>
        </nav>
        
        <div class="cart-wrapper">
            <button class="cart-btn" aria-label="Кошик">
                Кошик <span class="cart-counter">0</span>
            </button>
            <button class="burger-menu" aria-label="Відкрити меню">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="catalog-section">
            <h1>Каталог кімнатних рослин</h1>
            
            <div class="cards-container">
                
                <article class="card">
                    <img src="assets/plant1.jpg" alt="Монстера" class="card-img">
                    <div class="card-info">
                        <h2>Монстера Деліціоза</h2>
                        <p class="price">450 грн</p>
                        <button class="buy-btn">Додати в кошик</button>
                    </div>
                </article>

                <article class="card">
                    <img src="assets/plant2.jpg" alt="Фікус" class="card-img">
                    <div class="card-info">
                        <h2>Фікус Еластика</h2>
                        <p class="price">320 грн</p>
                        <button class="buy-btn">Додати в кошик</button>
                    </div>
                </article>

                <article class="card">
                    <img src="assets/plant3.jpg" alt="Сукулент" class="card-img">
                    <div class="card-info">
                        <h2>Ечеверія</h2>
                        <p class="price">150 грн</p>
                        <button class="buy-btn">Додати в кошик</button>
                    </div>
                </article>

            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 EcoPlant. Всі права захищено.</p>
            <p>Контакти: info@ecoplant.ua | +38 (099) 123-45-67</p>
        </div>
    </footer>

</body>
</html>
